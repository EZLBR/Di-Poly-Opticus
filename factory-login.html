<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login - Opticus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: Inter, sans-serif; }
    .login-page { max-width: 460px; margin: 70px auto; padding: 24px; }
    .login-card {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.08);
    }
    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .field input {
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,0.1);
    }
    .btn {
      width: 100%;
      min-height: 46px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #111827;
      color: white;
      font: inherit;
    }
    .hint { margin-top: 14px; opacity: 0.75; font-size: 14px; }
    .error { color: #b91c1c; min-height: 22px; }
  </style>
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1>FACTORY LOGIN</h1>
      <p>Access your factory dashboard and manage orders.</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="client@opticus.com" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="123456" required />
        </div>

        <div class="error" id="loginError"></div>
        <button class="btn" type="submit">LOGIN</button>
      </form>

      <p class="hint">Demo: rayban@opticus.com / 123456</p>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    initLoginForm("factory");
  </script>
</body>
</html>
