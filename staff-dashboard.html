<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Dashboard - Opticus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: Inter, sans-serif; }
    .dashboard-page { max-width: 1280px; margin: 0 auto; padding: 30px 24px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .session-box { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,0.08);
      background: white;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }
    .summary-card,
    .table-card {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.08);
    }
    .summary-card strong {
      display: block;
      font-size: 28px;
      margin-bottom: 6px;
    }
    .tables {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid rgba(15,23,42,0.08);
    }
    .table-card { overflow-x: auto; }
  </style>
</head>
<body>
  <script src="auth.js"></script>
  <script>
    requireRole(["staff"]);
  </script>

  <main class="dashboard-page">
    <div class="topbar">
      <div>
        <h1>STAFF DASHBOARD</h1>
        <p>Global view of users and orders across Opticus.</p>
      </div>

      <div id="sessionArea"></div>
    </div>

    <section class="summary-grid" id="staffSummary"></section>

    <section class="tables">
      <article class="table-card">
        <h2>All Orders</h2>
        <table>
          <thead>
            <tr>
              <th>Order</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Factory</th>
              <th>Status</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="staffOrdersBody"></tbody>
        </table>
      </article>

      <article class="table-card">
        <h2>Users</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Factory</th>
            </tr>
          </thead>
          <tbody id="staffUsersBody"></tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    renderSessionBadge();
    renderStaffDashboard();
  </script>
</body>
</html>
